name: Rebuild Notebooks

# Automatically re-runs the analysis pipeline and commits fresh notebooks +
# charts whenever the source scripts change, so the .ipynb files on GitHub
# always reflect the latest code (not stale output from a previous edit).

on:
  push:
    branches: [master]
    paths:
      - "notebooks/*.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install jupytext nbconvert ipykernel kaggle

      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p data/raw
          kaggle datasets download carrie1/ecommerce-data -p data/raw --unzip

      - name: Convert scripts to notebooks
        working-directory: notebooks
        run: jupytext --to notebook 01_data_cleaning.py 02_rfm_segmentation.py 03_kmeans_clustering.py

      - name: Execute notebooks in order
        working-directory: notebooks
        run: |
          jupyter nbconvert --to notebook --execute --inplace 01_data_cleaning.ipynb
          jupyter nbconvert --to notebook --execute --inplace 02_rfm_segmentation.ipynb
          jupyter nbconvert --to notebook --execute --inplace 03_kmeans_clustering.ipynb

      - name: Commit updated notebooks and charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notebooks/*.ipynb outputs/*.png
          git diff --staged --quiet || git commit -m "Auto-rebuild notebooks from latest scripts"
          git push
